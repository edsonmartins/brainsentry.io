version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: brainsentry
      POSTGRES_USER: brainsentry
      POSTGRES_PASSWORD: brainsentry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainsentry"]
      interval: 5s
      timeout: 5s
      retries: 5

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  brainsentry:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: brainsentry
      DB_USER: brainsentry
      DB_PASSWORD: brainsentry
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      JWT_SECRET: change-me-in-production-please
      BRAINSENTRY_AI_AGENTIC_MODEL_API_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  falkordb_data:
